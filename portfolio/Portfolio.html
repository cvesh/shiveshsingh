<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shivesh Singh — Senior Full-Stack Engineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #1F4E79;
      --accent-2: #2D6FA8;
      --accent-soft: #EEF3F8;
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --body: #14181F;
      --muted: #6B7280;
      --line: #E5E2DA;
      --line-strong: #C9C4B7;
      --ink: #0B0E13;
      --tag: #FBFAF6;

      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--body);
      font-family: var(--font-sans);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.5;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: color-mix(in oklab, var(--accent) 22%, transparent); }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    .mono { font-family: var(--font-mono); font-feature-settings: "ss02"; }
    .tabular { font-variant-numeric: tabular-nums; }

    /* layout container */
    .wrap { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 720px) { .wrap { padding: 0 20px; } }

    /* gridded paper background — subtle */
    .paper {
      background-image:
        linear-gradient(to right, rgba(20,24,31,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(20,24,31,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* striped placeholder (for project visuals) */
    .stripes {
      background:
        repeating-linear-gradient(
          135deg,
          color-mix(in oklab, var(--accent) 7%, transparent) 0 8px,
          transparent 8px 16px
        ),
        var(--accent-soft);
    }

    /* eyebrow label */
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }
    .eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: var(--accent); margin-right: 8px; vertical-align: 2px; }

    /* small section divider */
    .rule { height: 1px; background: var(--line); border: 0; margin: 0; }

    /* helper */
    .row { display: flex; }
    .col { display: flex; flex-direction: column; }
    .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; }

    #root { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="sections2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
